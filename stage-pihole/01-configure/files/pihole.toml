# Pi-hole v6 Konfiguration
# Dokumentation: https://docs.pi-hole.net/
#
# Diese Datei wird VOR dem Pi-hole Installer deployed.
# Werte die beim First Boot überschrieben werden:
#   - webserver.api.password (via secrets.env)
#
# HINWEIS: Dies ist eine Minimalkonfiguration.
# Pi-hole FTL ergänzt fehlende Werte automatisch mit Defaults.

[dns]
  # Upstream DNS Server (Quad9 gefiltert + DNSSEC)
  upstreams = ["9.9.9.9", "149.112.112.112"]

  # Interface auf dem Pi-hole lauscht
  # "all" = alle Interfaces (benötigt für Netzwerk-DNS)
  listeningMode = "all"

  # DNSSEC aktivieren
  dnssec = true

  # Single-Label-Namen (z.B. "router") nicht an Upstream weiterleiten
  domainNeeded = true

  # Reverse-Lookups für private IPs (192.168.x.x) nicht an Upstream weiterleiten
  bogusPriv = true

  # Conditional Forwarding (für lokale Hostnamen via Router)
  # Anpassen falls der Router nicht 192.168.178.1 ist
  [dns.revServer]
    active = true
    cidr = "192.168.178.0/24"
    target = "192.168.178.1"
    domain = "fritz.box"

  # Query-Logging deaktiviert: pihole.log wächst auf dem Pi Zero W zu schnell
  # (~3 MB/h) und füllt Log2RAM (50 MB) innerhalb von Stunden. FTL hält
  # alle Statistiken im RAM – das Web-UI zeigt weiterhin alle Abfragen.
  queryLogging = false

[webserver]
  # 80o = HTTP optional (bleibt für Kompatibilität)
  # 443s = HTTPS mit TLS (Zertifikat wird beim First Boot generiert)
  port = "80o,443s"

  [webserver.tls]
    # Combined PEM (Zertifikat + privater Schlüssel) – generiert beim First Boot
    cert = "/etc/pihole/tls.pem"

  [webserver.api]
    # Passwort wird beim First Boot via secrets.env gesetzt
    # Leerer String = kein Passwort (wird überschrieben)
    password = ""

    # REST API aktivieren
    prettyJSON = true

    # API für alle Origins erlauben (lokales Netzwerk)
    cors = "*"

[misc]
  # Privacy Level: 0=alles anzeigen, 1=Domains verstecken,
  # 2=Domains+Clients, 3=anonym, 4=deaktiviert
  privacylevel = 0

  # Temperatur in Celsius
  tempunit = "C"

[database]
  # Query-Datenbank deaktiviert (maxDBDays=0): verhindert SQLite-Schreibzugriffe
  # auf die SD-Karte. FTL hält aktuelle Statistiken im RAM (bis zum Neustart).
  # Hintergrund: pihole-FTL schreibt bei aktivierter DB jede DNS-Anfrage via
  # SQLite WAL auf /etc/pihole/pihole-FTL.db → hohe sys%/wa% auf ARMv6 ohne
  # Hardware-Crypto. Mit maxDBDays=0 entfallen alle DB-Schreibzugriffe.
  maxDBDays = 0

[dhcp]
  # DHCP deaktiviert – wird vom Router gehandhabt
  active = false
