# GitHub Actions Workflow: Pi-hole Image Build
#
# Trigger:
#   - Push eines Tags (v*) → Build + Release
#   - Manueller Trigger (workflow_dispatch)
#
# Baut pi-gen NATIV auf dem Runner (nicht via usimd/pi-gen-action),
# da der bookworm-Branch ein i386-Docker-Image verwendet, das auf
# amd64-Runnern nicht funktioniert.

name: Build Pi-hole Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image-Name (optional)'
        required: false
        default: 'pihole-zerow'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install pi-gen dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted qemu-user-static \
            debootstrap zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc gpg pigz xxd arch-test \
            binfmt-support kmod

      - name: Set up QEMU binfmt
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          ls /proc/sys/fs/binfmt_misc/qemu-arm || echo "WARN: qemu-arm not registered"

      - name: Clone pi-gen (bookworm branch)
        run: |
          git clone --depth 1 --branch bookworm \
            https://github.com/RPi-Distro/pi-gen.git pi-gen-build

      - name: Configure pi-gen
        run: |
          # config Datei kopieren – IMG_NAME um Uhrzeit ergänzen (HHMM)
          cp config pi-gen-build/config
          sed -i "s/^IMG_NAME=.*/IMG_NAME=$(date '+%H%M')-ph0/" pi-gen-build/config

          # Custom Stage kopieren
          cp -a stage-pihole pi-gen-build/stage-pihole

          # Stages 3-5 überspringen
          touch pi-gen-build/stage3/SKIP pi-gen-build/stage4/SKIP pi-gen-build/stage5/SKIP
          touch pi-gen-build/stage4/SKIP_IMAGES pi-gen-build/stage5/SKIP_IMAGES

      - name: Build image
        run: |
          cd pi-gen-build
          # Nativer Build (kein Docker – der i386 Container funktioniert nicht auf amd64)
          sudo ./build.sh
        env:
          CONTINUE: 0
          PRESERVE_CONTAINER: 0

      - name: Find built image
        id: find_image
        run: |
          IMAGE_PATH=$(ls -t pi-gen-build/deploy/*.img.xz 2>/dev/null | head -1)
          if [ -z "${IMAGE_PATH}" ]; then
            IMAGE_PATH=$(ls -t pi-gen-build/deploy/*.img 2>/dev/null | head -1)
          fi
          if [ -z "${IMAGE_PATH}" ]; then
            echo "Kein Image gefunden!"
            ls -la pi-gen-build/deploy/ || true
            exit 1
          fi
          echo "image_path=${IMAGE_PATH}" >> "$GITHUB_OUTPUT"
          echo "Image gefunden: ${IMAGE_PATH}"
          ls -lh "${IMAGE_PATH}"

      # Bei Tag-Push: Release erstellen
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_image.outputs.image_path }}
          generate_release_notes: true
          body: |
            ## PH0 Release ${{ github.ref_name }}

            Reproduzierbares Raspberry Pi OS Image mit Pi-hole v6 für den Raspberry Pi Zero W.
            Alle Konfigurationen sind versioniert – bei SD-Karten-Ausfall einfach neu flashen.

            ### Enthaltene Komponenten

            **DNS & Blocking**
            - Pi-hole v6 (FTL) – wird beim First Boot installiert
            - Upstream DNS: Quad9 gefiltert + DNSSEC (9.9.9.9 / 149.112.112.112)
            - 5 vorkonfigurierte Blocklisten: StevenBlack, OISD Small, HaGeZi Multi, EasyList Germany, StevenBlack Fakenews+Gambling+Porn

            **SD-Karten-Schutz**
            - Log2RAM (50 MB) – `/var/log` im RAM, stündliche Synchronisation; wird beim First Boot installiert
            - tmpfs für `/tmp` (30 MB) und `/var/tmp` (10 MB)
            - Swap deaktiviert
            - FTL Query-Datenbank deaktiviert (`maxDBDays = 0`)

            **Watchdog-Stack**
            - Hardware-Watchdog (`bcm2835_wdt`, 10s Timeout)
            - WLAN-Monitor: prüft alle 30s die Gateway-Erreichbarkeit, Reboot-Eskalation nach 5 Fehlversuchen
            - Health-Check: systemd Timer alle 5 Min (DNS, FTL, RAM, Temperatur, SD-Karten I/O)

            **Sicherheit & Härtung**
            - SSH: Key-Only, kein Passwort-Login, kein Root-Login
            - HTTPS: self-signed ECDSA P-256 TLS-Zertifikat (10 Jahre, SAN: IP + Hostname + `pi.hole`) – wird beim First Boot generiert
            - Firewall: nftables mit Default-Drop (erlaubt: 22, 53, 80, 443, 5353)
            - Avahi: mDNS-Advertisement (`pihole.local`)
            - Bluetooth + HDMI deaktiviert

            **First-Boot-Service**
            - Liest `secrets.env` von der Boot-Partition, setzt Hostname, User, WiFi, SSH-Key
            - Installiert Pi-hole, Log2RAM, lädt Gravity (Blocklisten)
            - Löscht `secrets.env` sicher nach Abschluss (`shred`)

            ### Verwendung
            1. `secrets.env` erstellen: `cp secrets.env.example secrets.env` und Werte eintragen
            2. Image herunterladen und auf SD-Karte flashen: `./scripts/flash.sh /dev/sdX`
               _(das Script entpackt das Image und kopiert `secrets.env` automatisch auf die Boot-Partition)_
            3. Pi booten – First Boot konfiguriert und installiert alles automatisch (~5–10 Min)
            4. Erreichbar unter: `http://<PI_IP>/admin` (HTTP) oder `https://<PI_IP>/admin` (HTTPS)
            5. Optional: `./scripts/validate.sh --wait` zur Post-Boot-Validierung

            ### Zielgerät
            Raspberry Pi Zero W (ARMv6, 512 MB RAM)
          draft: false
          prerelease: false

      # Bei manuellem Trigger: als Artifact hochladen
      - name: Upload as Artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: pihole-image
          path: ${{ steps.find_image.outputs.image_path }}
          retention-days: 7
