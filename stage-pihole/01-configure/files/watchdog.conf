# Watchdog Konfiguration für Raspberry Pi Zero W
# Kernel-Modul: bcm2835_wdt
#
# Der Hardware-Watchdog startet den Pi automatisch neu,
# wenn das System nicht innerhalb des Timeout-Intervalls
# den Watchdog "füttert".

# Watchdog Device
watchdog-device = /dev/watchdog

# Timeout in Sekunden (max. 15 für bcm2835_wdt)
watchdog-timeout = 10

# Maximale Systemlast bevor Neustart
max-load-1 = 24

# Minimaler freier Speicher (in Pages, 1 Page = 4 KB)
# 4096 Pages = 16 MB
min-memory = 4096

# Interface überwachen
interface = wlan0

# Temperaturüberwachung (in Milligrad Celsius)
# 80°C = 80000
temperature-sensor = /sys/class/thermal/thermal_zone0/temp
max-temperature = 80000

# Log-Verzeichnis
log-dir = /var/log/watchdog

# Reparaturversuche bevor Neustart
retry-timeout = 60

# Realtime-Scheduling für Watchdog-Daemon
realtime = yes
priority = 1
