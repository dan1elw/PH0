# GitHub Actions Workflow: Shell Script Linting
#
# Runs shellcheck and shfmt on all .sh files.
# Triggered on every push and PR.

name: Shell Lint

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - '**/*.sh'
      - '.shellcheckrc'
      - '.github/workflows/lint-shell.yml'
  pull_request:
    paths:
      - '**/*.sh'
      - '.shellcheckrc'
      - '.github/workflows/lint-shell.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: '.'
          additional_files: ''
          ignore_paths: pi-gen

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run shfmt
        run: shfmt -d -i 4 -ci $(find . -name '*.sh' -not -path './.git/*' -not -path './pi-gen/*')

  bats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run tests
        run: |
          if [ -f tests/run-tests.sh ]; then
            chmod +x tests/run-tests.sh
            ./tests/run-tests.sh
          elif ls tests/*.bats 1>/dev/null 2>&1; then
            bats tests/*.bats
          else
            echo "No tests found — skipping"
          fi
