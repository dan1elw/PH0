# Log2RAM Konfiguration
# Dokumentation: https://github.com/azlux/log2ram
#
# Angepasst für Raspberry Pi Zero W (512 MB RAM):
# - 50 MB RAM für Logs (ca. 10% des Gesamt-RAM)
# - Stündliche Synchronisation auf SD-Karte
# - journald-aware für saubere Log-Rotation

# RAM-Größe für /var/log
SIZE=50M

# E-Mail-Benachrichtigung bei vollem RAM deaktivieren
# (kein MTA auf dem Pi installiert)
MAIL=false

# Pfade die ins RAM gemountet werden
# Standard: nur /var/log
PATH_DISK="/var/log"

# rsync verwenden (zuverlässiger als cp)
USE_RSYNC=true

# journald-aware: Log-Rotation vor Sync erzwingen
JOURNALD_AWARE=true

# zram Kompression deaktivieren (spart CPU auf dem Zero W)
ZL2R=false

# Kompressionsalgorithmus (nur relevant wenn ZL2R=true)
COMP_ALG=lz4

# Unkomprimierte zram Disk-Größe (nur relevant wenn ZL2R=true)
LOG_DISK_SIZE=50M
